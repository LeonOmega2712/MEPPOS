<div class="container mx-auto p-4">
  <!-- Theme selector remains at top -->
  <app-theme-selector />

  <div class="divider"></div>

  <!-- Tabs -->
  <div class="tabs tabs-box">
    <input
      type="radio"
      name="settings_tabs"
      class="tab"
      aria-label="Categorías"
      [checked]="activeTab() === 'categories'"
      (change)="selectTab('categories')" />
    <div class="tab-content bg-base-100 border-base-300 p-6">
      <app-category-manager />
    </div>

    <input
      type="radio"
      name="settings_tabs"
      class="tab"
      aria-label="Productos"
      [checked]="activeTab() === 'products'"
      (change)="selectTab('products')" />
    <div class="tab-content bg-base-100 border-base-300 p-6">
      <app-product-manager />
    </div>
  </div>
</div>
