<div class="container mx-auto p-4">
  <!-- Tabs -->
  <div class="tabs tabs-box">
    <input
      type="radio"
      name="settings_tabs"
      class="tab"
      aria-label="Categorías"
      [checked]="activeTab() === 'categories'"
      (click)="selectTab($event, 'categories')" />
    <div class="tab-content bg-base-200 p-0">
      @if (activeTab() === 'categories') {
        <div [class.slide-from-left]="hasTabSwitched()">
          <app-category-manager />
        </div>
      }
    </div>

    <input
      type="radio"
      name="settings_tabs"
      class="tab"
      aria-label="Productos"
      [checked]="activeTab() === 'products'"
      (click)="selectTab($event, 'products')" />
    <div class="tab-content bg-base-200 p-0">
      @if (activeTab() === 'products') {
        <div [class.slide-from-right]="hasTabSwitched()">
          <app-product-manager />
        </div>
      }
    </div>
  </div>

  <div class="divider"></div>

  <app-theme-selector />
</div>
